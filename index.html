<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير المصاريف الذكي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>💰 إضافة عملية جديدة</h2>
        
        <div class="input-form">
            <input type="number" id="fAmt" placeholder="المبلغ" inputmode="decimal">
            <input type="text" id="fNote" placeholder="البيان (مثلاً: إيجار الشقة)">
            <input type="date" id="fDate">
            
            <select id="fCat">
                <option value="عام">عام</option>
                <option value="سكن">سكن</option>
                <option value="طعام">طعام</option>
                <option value="نقل">نقل</option>
                <option value="ترفيه">ترفيه</option>
            </select>

            <div class="file-section">
                <label>إرفاق فاتورة (صورة أو PDF):</label>
                <input type="file" id="fFile" accept="image/*,application/pdf">
            </div>

            <button onclick="processSave()" class="btn-save">حفظ ✅</button>
        </div>

        <hr>

        <div class="actions">
            <button onclick="downloadBackupExcel()" class="btn-excel">📥 تحميل إكسل (CSV)</button>
        </div>

        <h3>📋 الأرشيف</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>البيان</th>
                        <th>المبلغ</th>
                        <th>المرفق</th>
                        <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="dbTable"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
